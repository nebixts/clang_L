name: Release_Clang22d

on:
  workflow_dispatch: # Manual trigger from the "Actions" tab

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for creating releases

    steps:
      - name: Download Clang Archive
        run: |
          # Downloading clang-r596125 (Current AOSP Clang Stable)
          curl -L "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/6dee0c7f319c49456bff57337c1d82285af94898/clang-r596125.tar.gz" -o clang-r596125.tar.gz
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v2.0.0" # Incremented tag version
          name: "Clang22 r596125 Stable"
          body: |
            ## AOSP Clang Prebuilt
            - **Version:** CLang 22.0.2 - r596125 (Stable)
            - **Source:** [Android Google Source](https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+/mirror-goog-main-llvm-toolchain-source/README.md)
            - **Update Date:** 14 May 2026
          files: clang-r596125.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
