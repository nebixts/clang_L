name: Release_Clang2212

on:
  workflow_dispatch: # Manual trigger from the "Actions" tab

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for creating releases

    steps:
      - name: Download Clang Archive
        run: |
          # Downloading xclang-v22.1.2 Stable
          curl -L "https://github.com/Xtra-Manager-Software/XClang-Binaries/releases/download/xclangpolly-thinlto-22.1.2/XClang-22.1.2-Polly.tar.gz" -o xclang-v22.1.2-polly.tar.gz
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v2.0.1" # Incremented tag version
          name: "XClang - CLang 22.1.2 Stable"
          body: |
            ## Custom Clang Prebuilt
            - **Version:** XCLang - CLang 22.1.2 (Stable)
            - **Source:** [XCLang Source](https://github.com/Xtra-Manager-Software/XClang-Binaries/blob/xclang/README.md)
            - **Update Date:** April 2026
          files: xclang-v22.1.2-polly.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
